<!DOCTYPE html>
<html lang="es">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="CSS/main.css">
  <title>Estadísticas - Sport Port</title>
</head>

<body>

  <header class="header">
    <div class="header-container">
      <!-- IZQUIERDA / LOGO -->
      <div class="logo" onclick="location.href='main.html'">
        <img src="CSS/imagenes/Logo.png" class="logo-img">

        <div class="texto-logo">
          <div class="logo-nombre">Sport Port</div>
          <div class="logo-slogan">Tu rendimiento empieza acá</div>
        </div>
      </div>

      <!-- BOTÓN MENÚ HAMBURGUESA (móvil) -->
      <button class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- DERECHA / BOTONES -->
      <nav class="botones" id="headerNav">
        <button class="btn-cuenta">Crear cuenta</button>
        <button class="btn-sesion">Iniciar sesión</button>
      </nav>
    </div>
  <script src="JS/main.js"></script>
  </header>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="estadisticas-main">
    <div class="container">
      <h1>Estadísticas</h1>
      <div class="estadisticas-container">
        <div class="estadistica">
          <h2>Productos Totales</h2>
          <p id="productos-totales">0</p>
        </div>
        <div class="estadistica">
          <h2>Productos Sin Stock</h2>
          <p id="productos-sin-stock">0</p>
        </div>
        <div class="estadistica">
          <h2>Precio Total en Stock</h2>
          <p id="precio-total-stock">$0.00</p>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <!-- IZQUIERDA / TEXTO -->
      <div class="footer-izq">
        <p class="footer-texto">© 2026 Sport Port. Todos los derechos reservados.</p>
      </div>

      <!-- DERECHA / BOTONES IMAGEN -->
      <div class="footer-der">
        <button class="footer-btn">
          <img src="CSS/imagenes/boton_facebook.png" alt="Botón 1" class="footer-img">
        </button>
        <button class="footer-btn">
          <img src="CSS/imagenes/boton_instagram.png" alt="Botón 2" class="footer-img">
        </button>
        <button class="footer-btn">
          <img src="CSS/imagenes/boton_twtter_(X).png" alt="Botón 3" class="footer-img">
        </button>
      </div>
    </div>
  </footer>

  <script src="JS/estadisticas.js"></script>
</body>
</html>
