<!DOCTYPE html>
<html lang="es">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="CSS/main.css">
  <link rel="stylesheet" href="CSS/agregar-producto.css">
  <title>Agregar Producto - Sport Port</title>
</head>

<body>

  <header class="header">
    <div class="header-container">
      <!-- IZQUIERDA / LOGO -->
      <div class="logo" onclick="location.href='main.html'">
        <img src="CSS/imagenes/Logo.png" class="logo-img">

        <div class="texto-logo">
          <div class="logo-nombre">Sport Port</div>
          <div class="logo-slogan">Tu rendimiento empieza acá</div>
        </div>
      </div>

      <!-- BOTÓN MENÚ HAMBURGUESA (móvil) -->
      <button class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- DERECHA / BOTONES -->
      <nav class="botones" id="headerNav">
        <button class="btn-cuenta">Crear cuenta</button>
        <button class="btn-sesion">Iniciar sesión</button>
      </nav>
    </div>
  <script src="JS/main.js"></script>
  </header>

  <!-- NOTIFICACIÓN PERSONALIZADA -->
  <div id="notification" class="notification"></div>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="agregar-producto-main">
    <div class="form-container">
      <h1>Agregar Nuevo Producto</h1>
      <form id="productoForm">
        <div class="form-group">
          <label for="nombre">Nombre del Producto:</label>
          <input type="text" id="nombre" name="nombre" required>
        </div>

        <div class="form-group">
          <label for="precio">Precio:</label>
          <input type="number" id="precio" name="precio" step="0.01" min="0" required>
        </div>

        <div class="form-group">
          <label for="descripcion">Breve Descripción:</label>
          <textarea id="descripcion" name="descripcion" rows="4" required></textarea>
        </div>

        <div class="form-group">
          <label for="stock">Cantidad en Stock:</label>
          <input type="number" id="stock" name="stock" min="0" required>
        </div>

        <div class="form-group">
          <label for="imagen">Imagen del Producto (PNG o JPG):</label>
          <input type="file" id="imagen" name="imagen" accept=".png,.jpg,.jpeg" required>
          <div id="imagenPreview" class="imagen-preview"></div>
        </div>

        <button type="submit" class="btn-agregar">Agregar Producto</button>
      </form>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <!-- IZQUIERDA / TEXTO -->
      <div class="footer-izq">
        <p class="footer-texto">© 2026 Sport Port. Todos los derechos reservados.</p>
      </div>

      <!-- DERECHA / BOTONES IMAGEN -->
      <div class="footer-der">
        <button class="footer-btn">
          <img src="CSS/imagenes/boton_facebook.png" alt="Botón 1" class="footer-img">
        </button>
        <button class="footer-btn">
          <img src="CSS/imagenes/boton_instagram.png" alt="Botón 2" class="footer-img">
        </button>
        <button class="footer-btn">
          <img src="CSS/imagenes/boton_twtter_(X).png" alt="Botón 3" class="footer-img">
        </button>
      </div>
    </div>
  </footer>

  <script src="JS/agregar-producto.js"></script>

</body>
</html>
