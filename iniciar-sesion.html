<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="CSS/main.css">
  <link rel="stylesheet" href="CSS/iniciar-sesion.css">
  <title>Iniciar Sesión - Sport Port</title>
</head>
<body>
  <header class="header">
    <div class="header-container">
      <div class="logo" onclick="window.location.href='index.html'">
        <img src="CSS/imagenes/Logo.png" class="logo-img">
        <div class="texto-logo">
          <div class="logo-nombre">Sport Port</div>
        </div>
      </div>
    </div>
  </header>

  <main class="form-container">
    <section class="form-section">
      <h2>Iniciar Sesión</h2>
      
      <!-- FORMULARIO DE LOGIN -->
      <form id="iniciarSesionForm">
        <!-- EMAIL -->
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" placeholder="Ej: tu@gmail.com" required>
          <div class="error-message" id="error-email"></div>
          <div class="success-message" id="success-email">✓ Email válido</div>
        </div>

        <!-- CONTRASEÑA -->
        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="password-input-wrapper">
            <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
            <button type="button" class="btn-toggle-password" id="btnTogglePassword" title="Mostrar/ocultar contraseña">
              <span class="eye-icon">👁️</span>
            </button>
          </div>
          <div class="error-message" id="error-password"></div>
        </div>

        <!-- BOTONES -->
        <div class="button-group">
          <button type="submit" class="btn-iniciar" id="btn-iniciar">Iniciar Sesión</button>
          <button type="button" class="btn-cancelar" id="btn-cancelar">Cancelar</button>
        </div>

        <!-- CREAR CUENTA -->
        <div class="signup-link">
          <p>¿No tienes cuenta? <a href="crear-cuenta.html">Crea una aquí</a></p>
        </div>
      </form>

      <!-- MENSAJE DE ERROR GENERAL -->
      <div class="alert alert-error" id="alertError" style="display: none;"></div>

      <!-- MENSAJE DE ÉXITO -->
      <div class="success-state" id="successState">
        <div class="success-icon">✓</div>
        <div class="success-message-title">¡Sesión iniciada!</div>
        <div class="success-message-desc">Serás redirigido al inicio en unos segundos...</div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <div class="footer-izq">
        <p class="footer-texto">© 2026 Sport Port.</p>
      </div>
    </div>
  </footer>

  <script src="JS/iniciar-sesion.js"></script>
</body>
</html>
