<!DOCTYPE html>
<html lang="es">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="CSS/main.css">
  <title>Sport Port</title>
</head>

<body>

  <header class="header">
    <div class="header-container">
      <!-- IZQUIERDA / LOGO -->
      <div class="logo" onclick="window.scrollTo(0, 0); location.reload();">
        <img src="CSS/imagenes/Logo.png" class="logo-img">

        <div class="texto-logo">
          <div class="logo-nombre">Sport Port</div>
          <div class="logo-slogan">Tu rendimiento empieza acá</div>
        </div>
      </div>

      <!-- CATEGORÍAS -->
      <div class="categorias">
        <span class="categorias-label">Categorías</span>
        <div class="categorias-dropdown">
          <a href="#" class="categoria-item">Recomendados</a>
          <a href="#" class="categoria-item">Ofertas</a>
          <a href="#" class="categoria-item">Novedades</a>
        </div>
      </div>

      <!-- BOTÓN MENÚ HAMBURGUESA (móvil) -->
      <button class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- DERECHA / BOTONES -->
      <nav class="botones" id="headerNav">
        <button class="btn-cuenta">Crear cuenta</button>
        <button class="btn-sesion">Iniciar sesión</button>
      </nav>
    </div>
  <script src="JS/main.js"></script>
  </header>

  <!-- MODAL DE SELECCIÓN DE USUARIO -->
  <div id="userModal" class="user-modal">
    <div class="modal-content">
      <h3>Seleccionar tipo de usuario</h3>
      <button id="btnAdmin" class="modal-btn admin-btn">Administrador</button>
      <button id="btnUser" class="modal-btn user-btn">Usuario</button>
    </div>
  </div>

  <!-- BOTÓN ADMINISTRADOR FIJO -->
  <button id="adminBtn" class="admin-fixed-btn" style="display: none;">
    <span>+</span>
  </button>

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="hero-content">
      <h1>Sport Port</h1>
      <p>Tu tienda de insumos deportivos</p>
    </div>
  </section>

  <main>
    <section class="productos-section">
      <h2 class="seccion-titulo">Recomendados</h2>
      <div class="productos-lista" id="productos-recomendados">
      </div>
      <div class="paginacion" id="paginacion-recomendados">
        <button class="btn-inicio" id="btn-inicio-recomendados">Inicio</button>
        <button class="btn-anterior" id="btn-anterior-recomendados">Anterior</button>
        <span class="pagina-info" id="pagina-info-recomendados">Página 1 de 1</span>
        <button class="btn-siguiente" id="btn-siguiente-recomendados">Siguiente</button>
      </div>
    </section>

    <!-- SECCIÓN OFERTAS -->
    <section class="productos-section">
      <h2 class="seccion-titulo">Ofertas</h2>
      <div class="productos-lista" id="productos-ofertas">
      </div>
      <div class="paginacion" id="paginacion-ofertas">
        <button class="btn-inicio" id="btn-inicio-ofertas">Inicio</button>
        <button class="btn-anterior" id="btn-anterior-ofertas">Anterior</button>
        <span class="pagina-info" id="pagina-info-ofertas">Página 1 de 1</span>
        <button class="btn-siguiente" id="btn-siguiente-ofertas">Siguiente</button>
      </div>
    </section>

    <!-- SECCIÓN NOVEDADES -->
    <section class="productos-section">
      <h2 class="seccion-titulo">Novedades</h2>
      <div class="productos-lista" id="productos-novedades">
      </div>
      <div class="paginacion" id="paginacion-novedades">
        <button class="btn-inicio" id="btn-inicio-novedades">Inicio</button>
        <button class="btn-anterior" id="btn-anterior-novedades">Anterior</button>
        <span class="pagina-info" id="pagina-info-novedades">Página 1 de 1</span>
        <button class="btn-siguiente" id="btn-siguiente-novedades">Siguiente</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <!-- IZQUIERDA / TEXTO -->
      <div class="footer-izq">
        <p class="footer-texto">© 2026 Sport Port. Todos los derechos reservados.</p>
      </div>

      <!-- DERECHA / BOTONES IMAGEN -->
      <div class="footer-der">
        <button class="footer-btn">
          <img src="CSS/imagenes/boton_facebook.png" alt="Botón 1" class="footer-img">
        </button>
        <button class="footer-btn">
          <img src="CSS/imagenes/boton_instagram.png" alt="Botón 2" class="footer-img">
        </button>
        <button class="footer-btn">
          <img src="CSS/imagenes/boton_twtter_(X).png" alt="Botón 3" class="footer-img">
        </button>
      </div>
    </div>
  </footer>

</body>
</html>
