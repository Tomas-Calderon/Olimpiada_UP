<!DOCTYPE html>
<html>
<head>
  <title>Sport Port</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      margin-top: 70px;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: #202020;
      color: white;

      display: flex;
      justify-content: space-between;
      align-items: center;

      padding: 15px 30px;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
    }

    .botones button {
      margin-left: 10px;
      padding: 8px 12px;
      border: none;
      cursor: pointer;
      background-color: #ff6b00;
      color: white;
      border-radius: 5px;
    }

    .botones button:hover {
      background-color: #ff8c33;
    }
  </style>

</head>

<body>

  <header>
    <div class="logo" onclick="location.reload()">
      Sport Port
    </div>

    <div class="botones">
      <button>Crear cuenta</button>
      <button>Iniciar sesión</button>
    </div>
  </header>

  <h2>Bienvenido a Sport Port</h2>
  <p>Tu tienda de insumos deportivos</p>

</body>
</html>
