<!DOCTYPE html>
<html lang="es">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../CSS/main.css">
  <link rel="stylesheet" href="../CSS/administrar-caracteristicas.css">
  <title>Administrar Características - Sport Port</title>
</head>

<body>

  <header class="header">
    <div class="header-container">
      <!-- IZQUIERDA / LOGO -->
      <div class="logo" onclick="location.href='index.html'">
        <img src="../CSS/imagenes/Logo.png" class="logo-img">

        <div class="texto-logo">
          <div class="logo-nombre">Sport Port</div>
          <div class="logo-slogan">Tu rendimiento empieza acá</div>
        </div>
      </div>

      <!-- CATEGORÍAS -->
      <div class="categorias">
        <span class="categorias-label">Categorías</span>
        <div class="categorias-dropdown">
          <a href="recomendados.html" class="categoria-item">Recomendados</a>
          <a href="ofertas.html" class="categoria-item">Ofertas</a>
          <a href="novedades.html" class="categoria-item">Novedades</a>
        </div>
      </div>

      <!-- BOTÓN MENÚ HAMBURGUESA (móvil) -->
      <button class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- DERECHA / BOTONES -->
      <nav class="botones" id="headerNav">
        <!-- BOTÓN CARRITO (solo visible si está autenticado) -->
        <button class="btn-carrito" id="btnCarrito" title="Ver carrito" style="display: none;">
          Carrito
        </button>

        <!-- VISTA SIN AUTENTICAR -->
        <div id="botones-no-autenticado" class="botones-grupo">
          <button class="btn-cuenta">Crear cuenta</button>
          <button class="btn-sesion">Iniciar sesión</button>
        </div>

        <!-- VISTA AUTENTICADA -->
        <div id="usuario-autenticado" class="usuario-autenticado" style="display: none;">
          <div class="usuario-info">
            <span class="usuario-nombre" id="usuarioNombre"></span>
          </div>
          <button class="avatar-btn" id="btnAvatar">
            <div class="avatar" id="avatarCirculo">
              <span id="avatarIniciales"></span>
            </div>
          </button>
          
          <!-- MENÚ DESPLEGABLE -->
          <div class="dropdown-menu" id="dropdownMenu">
            <a href="mi-perfil.html" class="dropdown-item" id="miPerfil">Mi Perfil</a>
            <a href="#" class="dropdown-item" id="misCompras">Mis Compras</a>
            <a href="#" class="dropdown-item" id="gestionarUsuarios" style="display: none; color: #ffc107; font-weight: bold;">👥 Gestionar Usuarios</a>
            <a href="modificar-productos.html" class="dropdown-item" id="modificarProductos" style="display: none; color: #27ae60; font-weight: bold;">📦 Mis Productos</a>
            <a href="administrar-caracteristicas.html" class="dropdown-item" id="administrarCaracteristicas" style="display: none; color: #3498db; font-weight: bold;">🏷️ Administrar Características</a>
            <a href="agregar-producto.html" class="dropdown-item" id="agregarProductoBtn" style="display: none; color: #27ae60; font-weight: bold;">➕ Agregar Producto</a>
            <hr class="dropdown-divider">
            <button class="dropdown-item btn-logout" id="btnCerrarSesion">Cerrar Sesión</button>
          </div>
        </div>
      </nav>
    </div>
  <script src="../JS/main.js"></script>
  </header>

  <!-- NOTIFICACIÓN PERSONALIZADA -->
  <div id="notification" class="notification"></div>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="admin-caracteristicas-main">
    <div class="admin-container">
      <h1>Administrar Características</h1>
      
      <!-- BOTÓN AGREGAR NUEVA CARACTERÍSTICA -->
      <button class="btn-agregar-caracteristica" id="btnAgregarCaracteristica">
        Añadir Nueva Característica
      </button>

      <!-- LISTA DE CARACTERÍSTICAS -->
      <div class="caracteristicas-container" id="caracteristicasContainer">
        <!-- Se llenará dinámicamente con JavaScript -->
      </div>
    </div>
  </main>

  <!-- MODAL PARA AGREGAR/EDITAR CARACTERÍSTICA -->
  <div id="modalCaracteristica" class="modal-caracteristica" style="display: none;">
    <div class="modal-content">
      <h2 id="modalTitulo">Añadir Nueva Característica</h2>
      
      <form id="formCaracteristica">
        <div class="form-group">
          <label for="nombreCaracteristica">Nombre de la Característica:</label>
          <input type="text" id="nombreCaracteristica" name="nombre" maxlength="30" required>
        </div>

        <div class="form-group">
          <label for="iconoCaracteristica">Imagen de la Característica:</label>
          <input type="file" id="iconoCaracteristica" name="icono" accept="image/*" required>
          <div id="previewImagen" class="preview-imagen" style="display: none;">
            <img id="previewImg" src="" alt="Vista previa" style="max-width: 50px; max-height: 50px;">
          </div>
        </div>

        <div class="modal-buttons">
          <button type="submit" class="btn-guardar" id="btnGuardarCaracteristica">Guardar</button>
          <button type="button" class="btn-cancelar" id="btnCancelarModal">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-container">
      <!-- IZQUIERDA / TEXTO -->
      <div class="footer-izq">
        <p class="footer-texto">© 2026 Sport Port. Todos los derechos reservados.</p>
      </div>

      <!-- DERECHA / BOTONES IMAGEN -->
      <div class="footer-der">
        <button class="footer-btn">
          <img src="../CSS/imagenes/boton_facebook.png" alt="Botón 1" class="footer-img">
        </button>
        <button class="footer-btn">
          <img src="../CSS/imagenes/boton_instagram.png" alt="Botón 2" class="footer-img">
        </button>
        <button class="footer-btn">
          <img src="../CSS/imagenes/boton_twtter_(X).png" alt="Botón 3" class="footer-img">
        </button>
      </div>
    </div>
  </footer>

  <script src="../JS/administrar-caracteristicas.js"></script>

</body>
</html>
