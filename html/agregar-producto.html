<!DOCTYPE html>
<html lang="es">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../CSS/main.css">
  <link rel="stylesheet" href="../CSS/agregar-producto.css">
  <title>Agregar Producto - Sport Port</title>
</head>

<body>

  <header class="header">
    <div class="header-container">
      <!-- IZQUIERDA / LOGO -->
      <div class="logo" onclick="location.href='index.html'">
        <img src="../CSS/imagenes/Logo.png" class="logo-img">

        <div class="texto-logo">
          <div class="logo-nombre">Sport Port</div>
          <div class="logo-slogan">Tu rendimiento empieza acá</div>
        </div>
      </div>

      <!-- BARRA DE BÚSQUEDA -->
      <div class="barra-busqueda">
        <input type="text" class="busqueda-input" placeholder="Buscar productos..." disabled>
      </div>

      <!-- BOTÓN MENÚ HAMBURGUESA (móvil) -->
      <button class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- DERECHA / BOTONES -->
      <nav class="botones" id="headerNav">
        <!-- VISTA SIN AUTENTICAR -->
        <div id="botones-no-autenticado" class="botones-grupo">
          <button class="btn-cuenta">Crear cuenta</button>
          <button class="btn-sesion">Iniciar sesión</button>
        </div>

        <!-- VISTA AUTENTICADA -->
        <div id="usuario-autenticado" class="usuario-autenticado" style="display: none;">
          <div class="usuario-info">
            <span class="usuario-nombre" id="usuarioNombre"></span>
          </div>
          <button class="avatar-btn" id="btnAvatar">
            <div class="avatar" id="avatarCirculo">
              <span id="avatarIniciales"></span>
            </div>
          </button>
          
          <!-- MENÚ DESPLEGABLE -->
          <div class="dropdown-menu" id="dropdownMenu">
            <a href="mi-perfil.html" class="dropdown-item" id="miPerfil">Mi Perfil</a>
            <a href="#" class="dropdown-item" id="misCompras">Mis Compras</a>
            <hr class="dropdown-divider">
            <button class="dropdown-item btn-logout" id="btnCerrarSesion">Cerrar Sesión</button>
          </div>
        </div>
      </nav>
    </div>
  <script src="../JS/main.js"></script>
  </header>

  <!-- NOTIFICACIÓN PERSONALIZADA -->
  <div id="notification" class="notification"></div>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="agregar-producto-main">
    <div class="form-container">
      <h1>Agregar Nuevo Producto</h1>
      <form id="productoForm">
        <div class="form-group">
          <label for="nombre">Nombre del Producto:</label>
          <input type="text" id="nombre" name="nombre" maxlength="50" required>
        </div>

        <div class="form-group">
          <label for="precio">Precio:</label>
          <input type="text" id="precio" name="precio" maxlength="20" required>
        </div>

        <div class="form-group">
          <label for="descripcion">Descripción:</label>
          <textarea id="descripcion" name="descripcion" rows="4" required></textarea>
        </div>

        <div class="form-group">
          <label for="stock">Cantidad en Stock:</label>
          <input type="text" id="stock" name="stock" maxlength="15" required>
        </div>

        <div class="form-group">
          <label for="descuento">Descuento (%):</label>
          <input type="text" id="descuento" name="descuento" maxlength="3" value="0">
        </div>

        <div class="form-group">
          <label for="imagenes">Imagen del Producto (PNG o JPG):</label>
          <input type="file" id="imagenes" name="imagenes" accept=".png,.jpg,.jpeg" required>
          <div id="imagenesCount" class="imagenes-count"></div>
          <div id="imagenesPreview" class="imagenes-preview"></div>
        </div>

        <div class="form-group">
          <label>Características del Producto:</label>
          <div id="caracteristicasContainer" class="caracteristicas-selector">
            <!-- Se cargará dinámicamente con JavaScript -->
          </div>
          
          <!-- CREAR NUEVA CARACTERÍSTICA -->
          <div class="crear-caracteristica-section">
            <h4>Agregar Nueva Característica</h4>
            <div class="crear-caracteristica-form">
              <input type="text" id="nuevaCaracteristicaNombre" placeholder="Nombre de la característica" maxlength="30">
              <input type="file" id="nuevaCaracteristicaImagen" accept="image/*">
              <div id="previewCaracteristicaNueva" class="preview-imagen" style="display: none;">
                <img id="previewImgNueva" src="" alt="Vista previa" style="max-width: 50px; max-height: 50px;">
              </div>
              <button type="button" id="btnAgregarCaracteristica" class="btn-agregar-caracteristica">Agregar</button>
            </div>
          </div>
        </div>

        <button type="submit" class="btn-agregar">Agregar Producto</button>
      </form>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <!-- IZQUIERDA / TEXTO -->
      <div class="footer-izq">
        <p class="footer-texto">© 2026 Sport Port. Todos los derechos reservados.</p>
      </div>

      <!-- DERECHA / BOTONES IMAGEN -->
      <div class="footer-der">
        <button class="footer-btn">
          <img src="../CSS/imagenes/boton_facebook.png" alt="Botón 1" class="footer-img">
        </button>
        <button class="footer-btn">
          <img src="../CSS/imagenes/boton_instagram.png" alt="Botón 2" class="footer-img">
        </button>
        <button class="footer-btn">
          <img src="../CSS/imagenes/boton_twtter_(X).png" alt="Botón 3" class="footer-img">
        </button>
      </div>
    </div>
  </footer>

  <script src="../JS/agregar-producto.js"></script>

</body>
</html
