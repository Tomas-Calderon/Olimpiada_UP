<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="CSS/main.css">
  <title>Crear Cuenta - Sport Port</title>
</head>
<body>
  <header class="header">
    <div class="header-container">
      <div class="logo" onclick="window.location.href='main.html'">
        <img src="CSS/imagenes/Logo.png" class="logo-img">
        <div class="texto-logo">
          <div class="logo-nombre">Sport Port</div>
        </div>
      </div>
    </div>
  </header>

  <main class="form-container">
    <section class="form-section">
      <h2>Crear cuenta</h2>
      <form id="crearCuentaForm">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="apellido">Apellido</label>
        <input type="text" id="apellido" name="apellido" required>

        <label for="email">Mail</label>
        <input type="email" id="email" name="email" required>

        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required>

        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" name="telefono">

        <button type="submit" class="btn-guardar">Crear cuenta</button>
      </form>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <div class="footer-izq">
        <p class="footer-texto">© 2026 Sport Port.</p>
      </div>
    </div>
  </footer>

  <script src="JS/crear-cuenta.js"></script>
</body>
</html>
