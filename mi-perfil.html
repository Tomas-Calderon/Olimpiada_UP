<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="CSS/main.css">
  <link rel="stylesheet" href="CSS/mi-perfil.css">
  <title>Mi Perfil - Sport Port</title>
</head>
<body>
  <header class="header">
    <div class="header-container">
      <!-- IZQUIERDA / LOGO -->
      <div class="logo" onclick="window.location.href='main.html'">
        <img src="CSS/imagenes/Logo.png" class="logo-img">

        <div class="texto-logo">
          <div class="logo-nombre">Sport Port</div>
          <div class="logo-slogan">Tu rendimiento empieza acá</div>
        </div>
      </div>

      <!-- DERECHA / BOTONES -->
      <nav class="botones" id="headerNav">
        <!-- VISTA AUTENTICADA -->
        <div id="usuario-autenticado" class="usuario-autenticado">
          <div class="usuario-info">
            <span class="usuario-nombre" id="usuarioNombre"></span>
          </div>
          <button class="avatar-btn" id="btnAvatar">
            <div class="avatar" id="avatarCirculo">
              <span id="avatarIniciales"></span>
            </div>
          </button>
          
          <!-- MENÚ DESPLEGABLE -->
          <div class="dropdown-menu" id="dropdownMenu">
            <a href="mi-perfil.html" class="dropdown-item" id="miPerfil">Mi Perfil</a>
            <a href="#" class="dropdown-item" id="misCompras">Mis Compras</a>
            <hr class="dropdown-divider">
            <button class="dropdown-item btn-logout" id="btnCerrarSesion">Cerrar Sesión</button>
          </div>
        </div>
      </nav>
    </div>
    <script src="JS/main.js"></script>
  </header>

  <main class="perfil-container">
    <section class="perfil-section">
      <div class="perfil-header">
        <h1>Mi Perfil</h1>
        <p class="perfil-subtitle">Administra tu información personal</p>
      </div>

      <!-- FORMULARIO DE PERFIL -->
      <form id="perfilForm" class="perfil-form">
        
        <!-- NOMBRE -->
        <div class="form-group">
          <label for="nombrePerfil">Nombre</label>
          <input type="text" id="nombrePerfil" name="nombre" placeholder="Tu nombre" readonly>
          <div class="field-action">
            <button type="button" class="btn-edit" data-field="nombre">Editar</button>
          </div>
        </div>

        <!-- APELLIDO -->
        <div class="form-group">
          <label for="apellidoPerfil">Apellido</label>
          <input type="text" id="apellidoPerfil" name="apellido" placeholder="Tu apellido" readonly>
          <div class="field-action">
            <button type="button" class="btn-edit" data-field="apellido">Editar</button>
          </div>
        </div>

        <!-- EMAIL -->
        <div class="form-group">
          <label for="emailPerfil">Correo electrónico</label>
          <input type="email" id="emailPerfil" name="email" placeholder="tu@gmail.com" readonly>
          <div class="field-action">
            <button type="button" class="btn-edit" data-field="email">Editar</button>
          </div>
        </div>

        <!-- TELÉFONO -->
        <div class="form-group">
          <label for="telefonoPerfil">Teléfono</label>
          <input type="tel" id="telefonoPerfil" name="telefono" placeholder="Opcional" readonly>
          <div class="field-action">
            <button type="button" class="btn-edit" data-field="telefono">Editar</button>
          </div>
        </div>

        <!-- CONTRASEÑA (SIEMPRE OCULTA) -->
        <div class="form-group">
          <label for="passwordPerfil">Contraseña</label>
          <input type="password" id="passwordPerfil" placeholder="••••••••" readonly disabled>
          <div class="campo-bloqueado">
            <span class="lock-icon">🔒</span>
            <span>La contraseña siempre se mantiene oculta</span>
          </div>
        </div>

        <!-- FECHA DE CREACIÓN -->
        <div class="form-group">
          <label for="fechaCreacionPerfil">Miembro desde</label>
          <input type="text" id="fechaCreacionPerfil" placeholder="Fecha de creación" readonly disabled>
          <div class="campo-bloqueado">
            <span class="info-icon">ℹ️</span>
          </div>
        </div>

        <!-- BOTONES DE ACCIÓN -->
        <div class="form-actions">
          <button type="button" class="btn-cancelar" id="btnCancelarPerfil">Volver</button>
          <button type="button" class="btn-guardar" id="btnGuardarCambios" style="display: none;">Guardar Cambios</button>
        </div>
      </form>
    </section>
  </main>

  <!-- MODAL DE VERIFICACIÓN DE CONTRASEÑA -->
  <div id="passwordVerificationModal" class="modal-overlay">
    <div class="modal-content">
      <h3>Verificar contraseña</h3>
      <p>Ingresa tu contraseña para confirmar los cambios</p>
      
      <div class="form-group">
        <label for="passwordVerification">Contraseña</label>
        <div class="password-input-wrapper">
          <input type="password" id="passwordVerification" placeholder="Ingresa tu contraseña" required>
          <button type="button" class="btn-toggle-password" id="btnTogglePasswordVer">
            <span class="eye-icon">👁️</span>
          </button>
        </div>
        <div class="error-message" id="passwordVerificationError"></div>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-cancelar" id="btnCancelarVerificacion">Cancelar</button>
        <button type="button" class="btn-guardar" id="btnConfirmarVerificacion">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="JS/mi-perfil.js"></script>
</body>
</html>
